on:
  push:
    branches: [package]
    paths:
      - 'lantern/**'
      - '.github/workflows/R-CMD-check.yaml'
  pull_request:
    branches: [package]
    paths:
      - 'lantern/**'
      - '.github/workflows/R-CMD-check.yaml'

name: R CMD check

jobs:
  check:
    runs-on: ubuntu-latest
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      _R_CHECK_FORCE_SUGGESTS_: false

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.4'
          use-public-rspm: true

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libcurl4-openssl-dev libssl-dev libxml2-dev \
            libhdf5-dev libbz2-dev liblzma-dev

      # Install all DESCRIPTION deps + Bioc packages.
      # bioc:: prefix tells setup-r-dependencies to use BiocManager;
      # it auto-selects the Bioc version that matches the installed R.
      # GMMAT is in Suggests but all its chunks are eval=FALSE, so it is
      # not required for the check to pass.
      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          working-directory: lantern
          extra-packages: |
            bioc::SeqArray
            bioc::SeqVarTools
            any::knitr
            any::rmarkdown
            any::rcmdcheck

      # --no-manual skips PDF manual (no LaTeX needed).
      # error-on: '"error"' passes warnings but fails on errors.
      - uses: r-lib/actions/check-r-package@v2
        with:
          working-directory: lantern
          args: 'c("--no-manual", "--timings")'
          error-on: '"error"'
          upload-snapshots: true
