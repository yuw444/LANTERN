[workspace]
authors = ["yuw444 <yuw926@icloud.com>"]
channels = ["conda-forge", "bioconda"]
name = "LANTERN"
platforms = ["linux-64"]
version = "0.1.0"

[dependencies]
r-base = ">=4.5.3,<4.6"
r-languageserver = ">=0.3.18,<0.4"
r-httpgd = ">=2.1.4,<3"
radian = ">=0.6.15,<0.7"
bioconductor-seqarray = ">=1.50.1,<2"
bioconductor-seqvartools = ">=1.48.0,<2"
bioconductor-snpstats = ">=1.60.0,<2"
"r-data.table" = ">=1.17.8,<2"
r-dplyr = ">=1.2.1,<2"
r-tidyr = ">=1.3.2,<2"
r-stringr = ">=1.6.0,<2"
r-vcfr = ">=1.16.0,<2"
r-optparse = ">=1.8.2,<2"
r-testthat = ">=3.3.2,<4"
r-devtools = ">=2.5.2,<3"
r-roxygen2 = ">=8.0.0,<9"
r-doparallel = ">=1.0.17,<2"
r-foreach = ">=1.5.2,<2"
r-iterators = ">=1.0.14,<2"
r-future = ">=1.70.0,<2"
"r-future.apply" = ">=1.20.2,<2"
bcftools = ">=1.23.1,<2"
htslib = ">=1.23.1,<2"
samtools = ">=1.23.1,<2"
gcc = ">=14"
gxx = ">=14"
r-compquadform = ">=1.4.4,<2"

[tasks]
install-lantern = "R_MAKEVARS_USER=$PWD/R.Makevars.local R CMD INSTALL lantern/"
test = 'R_MAKEVARS_USER=$PWD/R.Makevars.local Rscript -e "devtools::test(\"lantern\")"'
install-cran-gmmat = 'Rscript -e "install.packages(\"GMMAT\", repos=\"https://cloud.r-project.org\")"'
r = "radian"
